<svg xmlns="http://www.w3.org/2000/svg"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.w3.org/2000/svg http://www.w3.org/TR/2002/WD-SVG11-20020108/SVG.xsd"
  viewBox="0 0 100 100">
  <!-- Trigger autocomplete here -->
  <defs>

    <filter id="topLight" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology in="SourceAlpha" operator="erode" radius="8"></feMorphology>
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feDiffuseLighting in="blur" surfaceScale="3" diffuseConstant="4" lighting-color="#ffffff"
        result="light">
        <feDistantLight azimuth="-90" elevation="5" />
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="light" operator="arithmetic" k1="0" k2="1" k3="0.8"
        k4="0" />
    </filter>

    <filter id="blur">
      <feGaussianBlur stdDeviation="6" />
      <feMerge>
        <feMergeNode />
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>

