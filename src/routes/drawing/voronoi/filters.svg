<svg xmlns="http://www.w3.org/2000/svg"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.w3.org/2000/svg http://www.w3.org/TR/2002/WD-SVG11-20020108/SVG.xsd"
  viewBox="0 0 100 100">
  <!-- Trigger autocomplete here -->
  <defs>

    <filter id="shrink">
      <feMorphology operator="erode" radius="0"></feMorphology>
    </filter>

    <filter id="topLight" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur" />
      <feDiffuseLighting in="blur" surfaceScale="2" diffuseConstant="3" lighting-color="#8080ff"
        result="light">
        <feDistantLight azimuth="-90" elevation="1" />
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="light" operator="arithmetic" k1="0" k2="1" k3="0.8"
        k4="0" />
    </filter>

  </defs>
</svg>

