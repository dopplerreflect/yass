<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/DrLogoSimple.optimized.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="screen" style="display: contents">%sveltekit.body%</div>
	</body>
	<script>
		const screen = document.getElementById("screen");
		function handleKeys(event) {
			if(event.key === 'f') screen.requestFullscreen().catch((error) => console.error(error));
		}
		document.addEventListener("keydown", handleKeys);
	</script>
</html>
